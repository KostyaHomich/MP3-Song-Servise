server:
  port: 8082

spring:
  application:
    name: song-service
  datasource:
    url: jdbc:postgresql://localhost:5434/song_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.example.song: INFO
    org.springframework.web: INFO

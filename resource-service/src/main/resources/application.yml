server:
  port: 8081

spring:
  application:
    name: resource-service
  datasource:
    url: jdbc:postgresql://localhost:5432/resource_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

song-service:
  base-url: http://localhost:8082

logging:
  level:
    com.example.resource: INFO
    org.springframework.web: INFO

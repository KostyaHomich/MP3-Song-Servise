services:
  resource-db:
    image: postgres:17
    container_name: resource-db
    environment:
      POSTGRES_DB: resource_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - resource-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resource_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  song-db:
    image: postgres:17
    container_name: song-db
    environment:
      POSTGRES_DB: song_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - song-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d song_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  resource-db-data:
  song-db-data:
